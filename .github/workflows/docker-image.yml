name: Build Docker Image and Generate Tar

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    # 添加 QEMU 支持，用于多架构构建
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
      
    - name: Build Docker image
      run: |
        docker build -t yaraxserver:${{ github.sha }} .
        
    - name: Save Docker image
      run: |
        docker save yaraxserver:${{ github.sha }} > yaraxserver.tar
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: yaraxserver.tar
        retention-days: 5

    # 新增：推送到 Docker Hub（仅在推送到 main 分支或标签时）
    - name: Build and push to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64/v8
        tags: |
          ${{ github.ref_type == 'tag' && format('relaxcloud/yaraxserver:{0}', github.ref_name) || '' }}
          ${{ github.ref_name == 'main' && 'relaxcloud/yaraxserver:latest' || '' }}
        push: true
        
